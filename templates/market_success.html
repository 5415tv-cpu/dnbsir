<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>결제 완료 - 동네비서 마켓</title>
    <!-- Google Fonts Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-box {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* 큰 성공 체크 아이콘 */
        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(39, 174, 96, 0.15);
            border: 4px solid #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        .icon-circle svg {
            width: 50px;
            height: 50px;
            color: #2ecc71;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fbbf24;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .sub-msg {
            font-size: 1.5rem;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* 결제 영수증 영역 */
        .receipt-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 35px;
            text-align: left;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .receipt-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .label {
            color: #94a3b8;
            font-weight: 700;
        }

        .value {
            color: #ffffff;
            font-weight: 900;
        }

        .value.price {
            color: #fbbf24;
            font-size: 1.4rem;
        }

        /* 큼직한 이동 버튼 */
        .btn-back {
            display: block;
            width: 100%;
            height: 75px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f172a;
            font-size: 1.6rem;
            font-weight: 900;
            text-decoration: none;
            line-height: 75px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-back:active {
            transform: scale(0.96);
            background: #d97706;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2>결제 완료</h2>
        <div class="sub-msg">결제가 안전하게 완료되었습니다.<br>택배 배송이 시작됩니다.</div>

        <div class="receipt-card">
            <div class="receipt-row">
                <span class="label">상품명</span>
                <span class="value">{{ order_name }}</span>
            </div>
            <div class="receipt-row">
                <span class="label">주문번호</span>
                <span class="value" style="font-size: 1rem;">{{ order_id }}</span>
            </div>
            <div class="receipt-row">
                <span class="label">결제금액</span>
                <span class="value price">{{ amount }}원</span>
            </div>
        </div>

        <a href="/market" class="btn-back">마켓으로 돌아가기</a>
    </div>
</body>
</html>
