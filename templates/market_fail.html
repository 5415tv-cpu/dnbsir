<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>결제 실패 - 동네비서 마켓</title>
    <!-- Google Fonts Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .fail-box {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(239, 68, 68, 0.3); /* 실패 경고용 붉은색 테두리 */
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* 실패 엑스 아이콘 */
        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.15);
            border: 4px solid #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .icon-circle svg {
            width: 50px;
            height: 50px;
            color: #ef4444;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ef4444;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .sub-msg {
            font-size: 1.5rem;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* 결제 에러 상세 영역 */
        .error-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 35px;
            text-align: left;
        }

        .error-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 1.2rem;
        }

        .label {
            color: #94a3b8;
            font-weight: 700;
        }

        .value {
            color: #ffffff;
            font-weight: 900;
            line-height: 1.4;
            word-break: break-all;
        }

        /* 큼직한 이동 버튼 */
        .btn-back {
            display: block;
            width: 100%;
            height: 75px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f172a;
            font-size: 1.6rem;
            font-weight: 900;
            text-decoration: none;
            line-height: 75px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-back:active {
            transform: scale(0.96);
            background: #d97706;
        }
    </style>
</head>
<body>
    <div class="fail-box">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <h2>결제 실패</h2>
        <div class="sub-msg">결제 중 오류가 발생했습니다.<br>아래 실패 내용을 확인해 주세요.</div>

        <div class="error-card">
            <div class="error-row">
                <span class="label">실패 이유</span>
                <span class="value">{{ error_msg }}</span>
            </div>
        </div>

        <a href="/market" class="btn-back">다시 시도하기</a>
    </div>
</body>
</html>
