<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단골식당 둘러보기 | 동네비서</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1e293b 0%, #090d16 100%);
            color: #f8fafc;
            padding-bottom: 120px;
        }

        /* ── 헤더 ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9, 13, 22, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left { display: flex; flex-direction: column; gap: 2px; }

        .market-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            font-weight: 900;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #f8fafc;
        }

        /* ── 식당 그리드 ── */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px 16px;
        }

        .store-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .store-card:active {
            transform: scale(0.96);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.5);
        }

        .store-img-wrap {
            width: 100%;
            aspect-ratio: 1;
            background: #1e293b;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .store-info {
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .store-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: #f8fafc;
            line-height: 1.3;
        }

        .store-owner {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .store-category {
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #94a3b8;
            grid-column: 1 / -1;
        }

        /* ── 플로팅 뒤로가기 버튼 ── */
        .btn-back-floating {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="header-left">
            <span class="market-badge">우리동네 단골식당</span>
            <div class="header-title">맛있는 식당 둘러보기 🍔</div>
        </div>
    </header>

    <!-- 식당 그리드 -->
    <div class="store-grid">
        {% if stores %}
            {% for store in stores %}
            <div class="store-card" onclick="location.href='/citizen/reserve?store_id={{ store.store_id }}'">
                <div class="store-img-wrap">
                    🍽️
                </div>
                <div class="store-info">
                    <div class="store-name">{{ store.name or '이름 없는 식당' }}</div>
                    <div class="store-owner">{{ store.owner_name or '사장님' }}</div>
                    <div class="store-category">{{ store.category or '식당/기타' }}</div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <div style="font-size: 2.5rem; margin-bottom: 12px;">😢</div>
                <div>등록된 단골식당이 없습니다.</div>
            </div>
        {% endif %}
    </div>

    <!-- 뒤로가기 -->
    <button class="btn-back-floating" onclick="location.href='/dashboard'">
        <span>🏠</span> 메인으로
    </button>

</body>
</html>
