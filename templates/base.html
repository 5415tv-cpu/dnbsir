<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F0F2F5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>내 손안의 동네비서</title>
    <meta name="description" content="내 손안의 동네비서 - 농민과 기사님을 위한 AI 통합 관리 솔루션">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503650.png">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    {% block head %}{% endblock %}
</head>

<body>
    <!-- AI Status Bar (Fixed Top) -->
    <div class="ai-status-bar">
        <div class="ai-pulse"></div>
        AI 동네비서가 실시간 관리 중
    </div>

    <div class="main-container" style="padding-bottom: 15vh;"> <!-- Padding for taller nav -->

        <!-- Sticky Header -->
        {% block header %}
        <header class="sticky-header" style="top: 45px;"> <!-- Adjust for AI Bar -->
            <h1 class="app-title">
                내 손안의 동네비서
            </h1>
        </header>
        {% endblock %}

        {% block page_header %}
        <!-- Override in child -->
        {% endblock %}

        <!-- Main Content -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>

    </div>

    {% if not hide_bottom_nav %}
    <!-- Bottom Navigation (Kiosk Style) -->
    <nav class="bottom-nav">
        <a href="/admin/dashboard" class="nav-item">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">홈</div>
        </a>
        <a href="/market" class="nav-item">
            <div class="nav-icon">🛒</div>
            <div class="nav-text">마켓</div>
        </a>
        <a href="/admin/farm/orders" class="nav-item">
            <div class="nav-icon">📅</div>
            <div class="nav-text">예약</div>
        </a>
        <a href="/admin/tax" class="nav-item">
            <div class="nav-icon">📒</div>
            <div class="nav-text">장부</div>
        </a>
    </nav>
    {% endif %}

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
