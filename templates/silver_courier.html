<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어르신 전용 택배 - 동네비서</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: #fff9db;
            /* Warm Yellow Background */
            margin: 0;
            padding: 10px;
            font-size: 18px;
            /* Base font size increased */
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 20px;
            border-bottom: 3px solid #ffc107;
            padding-bottom: 10px;
        }

        .ai-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .big-btn {
            width: 100%;
            padding: 25px;
            border: none;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        .big-btn:active {
            transform: scale(0.98);
        }

        .btn-voice {
            background-color: #28a745;
        }

        .btn-camera {
            background-color: #17a2b8;
        }

        .form-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            background-color: #fcfcfc;
        }

        .form-section h3 {
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #555;
            border-left: 5px solid #ffc107;
            padding-left: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.4rem;
        }

        input[type="text"],
        input[type="tel"],
        select,
        input[type="number"] {
            width: 100%;
            padding: 15px;
            /* Taller inputs */
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 1.4rem;
            /* Big text in input */
            box-sizing: border-box;
        }

        input:focus {
            border-color: #ffc107;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 25px;
            background-color: #ffc107;
            color: #000;
            font-size: 2rem;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
            margin-top: 20px;
        }

        /* Loading Overlay */
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            color: white;
            text-align: center;
            padding-top: 200px;
            font-size: 2rem;
        }

        /* AI Overlay */
        #ai_overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .mic-animation {
            width: 120px;
            height: 120px;
            background: #28a745;
            border-radius: 50%;
            margin-bottom: 40px;
            animation: pulse 1.5s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
        }

        #ai_realtime_text {
            font-size: 2rem;
            font-weight: bold;
            padding: 20px;
            border: 3px dashed #666;
            border-radius: 15px;
            width: 85%;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            word-break: keep-all;
            line-height: 1.4;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 30px rgba(40, 167, 69, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
            }
        }
    </style>
    <!-- Daum Postcode -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <!-- Toss Payments Widget SDK -->
    <script src="https://js.tosspayments.com/v1/payment-widget"></script>
</head>

<body>

    <div class="container">
        <h2>어르신 쉬운 택배</h2>

        <!-- Top AI Buttons -->
        <div class="ai-buttons">
            <button type="button" class="big-btn btn-voice" onclick="startVoiceSearch()">
                🎤 말로 주소 입력하기
            </button>
            <button type="button" class="big-btn btn-camera" onclick="document.getElementById('cameraInput').click()">
                📸 사진 찍어 입력하기
                <input type="file" id="cameraInput" capture="environment" accept="image/*" style="display:none"
                    onchange="processImage(this)">
            </button>
        </div>

        <form id="courierForm" onsubmit="submitCourierRequest(event)">
            <input type="hidden" name="payment_method" value="points">
            <!-- Simple flow: Points only for now? Or Pay Later. Let's use Points Default -->

            <!-- Sender -->
            <div class="form-section">
                <h3>📤 보내는 사람</h3>
                <label
                    style="font-size: 1rem; color: #555; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; cursor: pointer;">
                    <input type="checkbox" id="saveSender" style="width: 20px; height: 20px; margin: 0;">정보 저장 (다음에 또
                    쓸게요)
                </label>

                <label>이름</label>
                <input type="text" id="sender_name" name="sender_name" value="{{ store.get('owner_name', '') }}"
                    required>

                <label>전화번호</label>
                <input type="tel" id="sender_phone" name="sender_phone" value="{{ store.get('phone', '') }}" required>

                <label>주소</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="sender_addr" name="sender_addr" value="{{ store.get('address', '') }}"
                        readonly style="flex: 1;">
                    <button type="button" onclick="execDaumPostcode('sender_addr')"
                        style="background:#333; color:white; border:none; border-radius:8px; padding:0 20px; font-size:1.2rem; cursor:pointer;">검색</button>
                </div>
                <input type="text" id="sender_addr_detail" name="sender_addr_detail" placeholder="상세 주소 (호수 등)">
            </div>

            <!-- Receiver -->
            <div class="form-section">
                <h3>📥 받는 사람</h3>
                <label>이름</label>
                <input type="text" id="receiver_name" name="receiver_name" placeholder="예: 홍길동" required>

                <label>전화번호</label>
                <input type="tel" id="receiver_phone" name="receiver_phone" placeholder="예: 010-1234-5678" required>

                <label>주소</label>
                <input type="button" value="주소 검색" onclick="execDaumPostcode()"
                    style="background:#333; color:white; font-size:1.2rem; cursor:pointer;">
                <input type="text" id="receiver_addr" name="receiver_addr" placeholder="주소" readonly required>
                <input type="text" id="receiver_addr_detail" name="receiver_addr_detail" placeholder="상세 주소 (호수 등)">
            </div>

            <!-- Item -->
            <div class="form-section">
                <h3>📦 물품 정보</h3>
                <label>무엇을 보내시나요?</label>
                <input type="text" id="item_type" name="item_type" placeholder="예: 김치, 쌀, 옷" required>

                <label>몇 박스인가요?</label>
                <input type="number" name="quantity" value="1" min="1" max="10">
            </div>

            <!-- Payment -->
            <div class="form-section">
                <h3>💳 결제하기</h3>

                {% if store.get('points') %}
                <label
                    style="font-size: 1.3rem; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center;">
                    <input type="radio" name="payment_method" value="points" onchange="togglePaymentMethod(this.value)"
                        checked style="width: 25px; height: 25px; margin-right: 10px;">
                    내 포인트 사용 (보유: {{ "{:,}".format(store.points) }} P)
                </label>
                {% endif %}

                <label
                    style="font-size: 1.3rem; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center;">
                    <input type="radio" name="payment_method" value="toss" onchange="togglePaymentMethod(this.value)" {%
                        if not store.get('points') %}checked{% endif %}
                        style="width: 25px; height: 25px; margin-right: 10px;">
                    토스 페이먼츠 (카드/계좌)
                </label>

                <div id="toss-widget-area"
                    style="margin-top: 15px; {% if store.get('points') %}display:none;{% endif %}">
                    <div id="payment-method"></div>
                    <div id="agreement"></div>
                </div>
            </div>

            <button type="button" class="submit-btn" id="submitBtn" onclick="requestPayment()">택배 예약 및 결제하기</button>
        </form>
    </div>

    <!-- Loading -->
    <div id="loading">처리 중입니다...<br>잠시만 기다려주세요.</div>

    <!-- AI Overlay -->
    <div id="ai_overlay">
        <div style="font-size:2rem; margin-bottom:30px; font-weight:bold;">말씀해 주세요...</div>
        <div class="mic-animation">🎤</div>
        <div id="ai_realtime_text">듣고 있습니다...</div>
        <button onclick="closeAIOverlay()"
            style="margin-top:40px; padding:15px 40px; font-size:1.5rem; background:transparent; border:3px solid white; color:white; border-radius:40px; cursor:pointer;">취소</button>
    </div>

    <script>
        // --- 1. Daum Postcode ---
        function execDaumPostcode(targetId) {
            // Default to receiver_addr if no targetId provided (legacy support)
            if (!targetId) targetId = 'receiver_addr';

            new daum.Postcode({
                oncomplete: function (data) {
                    var addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                    if (data.buildingName !== '') { addr += ' (' + data.buildingName + ')'; }

                    document.getElementById(targetId).value = addr;

                    // Focus detail input if exists
                    var detailInput = document.getElementById(targetId + '_detail');
                    if (detailInput) detailInput.focus();
                }
            }).open();
        }

        // --- 2. Payment Widget & Logic ---
        const clientKey = "test_ck_PBal2vxj81ND2OPW6a7135RQgOAN"; // Use same test key as general page
        const customerKey = "ANONYMOUS"; // PaymentWidget.ANONYMOUS
        let paymentWidget = null;
        let paymentMethodWidget = null;

        // Initialize Widget
        try {
            if (window.PaymentWidget) {
                paymentWidget = PaymentWidget(clientKey, customerKey);
                paymentMethodWidget = paymentWidget.renderPaymentMethods(
                    '#payment-method',
                    { value: 6000 }, // Initial value (Small 6000 * 1)
                    { variantKey: 'DEFAULT' }
                );
                paymentWidget.renderAgreement('#agreement', { variantKey: 'AGREEMENT' });
            }
        } catch (e) {
            console.error("Toss Widget Init Error:", e);
        }

        function togglePaymentMethod(method) {
            const area = document.getElementById('toss-widget-area');
            if (method === 'toss') {
                area.style.display = 'block';
                updateWidgetAmount();
            } else {
                area.style.display = 'none';
            }
        }

        function updateWidgetAmount() {
            if (!paymentMethodWidget) return;
            const quantityInput = document.querySelector('input[name="quantity"]');
            let qty = parseInt(quantityInput.value) || 1;
            if (qty < 1) qty = 1;

            // Default to Small (6000) for Silver Page simplicity
            const price = 6000;
            const totalAmount = price * qty;

            paymentMethodWidget.updateAmount(totalAmount);
        }

        // Listen for quantity change
        document.addEventListener("DOMContentLoaded", function () {
            const qtyInput = document.querySelector('input[name="quantity"]');
            if (qtyInput) qtyInput.addEventListener('change', updateWidgetAmount);

            // Load Sender Info
            const savedSenderNode = localStorage.getItem("courier_sender_info");
            if (savedSenderNode) {
                try {
                    const senderInfo = JSON.parse(savedSenderNode);
                    if (document.getElementById("sender_name")) document.getElementById("sender_name").value = senderInfo.name || "";
                    if (document.getElementById("sender_phone")) document.getElementById("sender_phone").value = senderInfo.phone || "";
                    if (document.getElementById("sender_addr")) document.getElementById("sender_addr").value = senderInfo.addr || "";
                    if (document.getElementById("sender_addr_detail")) document.getElementById("sender_addr_detail").value = senderInfo.addr_detail || "";
                    if (document.getElementById("saveSender")) document.getElementById("saveSender").checked = true;
                } catch (e) { }
            }
        });

        // --- 3. AI Voice & Camera (Existing) ---
        let recognition;

        function closeAIOverlay() {
            document.getElementById('ai_overlay').style.display = 'none';
            if (recognition) recognition.stop();
        }

        function startVoiceSearch() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("죄송합니다. 이 기능은 크롬 브라우저에서만 됩니다.");
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            const overlay = document.getElementById('ai_overlay');
            const textDisplay = document.getElementById('ai_realtime_text');

            overlay.style.display = 'flex';
            textDisplay.innerText = "듣고 있습니다...";

            recognition.start();

            recognition.onresult = function (event) {
                let interim = '';
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                textDisplay.innerText = final + interim;
                if (final) {
                    textDisplay.innerText = "알아듣고 있습니다...";
                    recognition.stop();
                    sendToAI(final);
                }
            };

            recognition.onerror = function (event) {
                if (event.error !== 'no-speech') {
                    alert("오류가 났습니다: " + event.error);
                    closeAIOverlay();
                }
            };
        }

        async function sendToAI(text) {
            try {
                const response = await fetch('/api/ai/parse-voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                closeAIOverlay();
                applyAIResult(data);
            } catch (e) {
                closeAIOverlay();
                alert("오류가 발생했습니다.");
            }
        }

        async function processImage(input) {
            if (input.files && input.files[0]) {
                const formData = new FormData();
                formData.append('image', input.files[0]);

                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = "사진을 읽고 있습니다...\\n잠시만 기다려주세요.";

                try {
                    const response = await fetch('/api/ai/parse-image', { method: 'POST', body: formData });
                    const data = await response.json();
                    document.getElementById('loading').style.display = 'none';
                    applyAIResult(data);
                } catch (e) {
                    document.getElementById('loading').style.display = 'none';
                    alert("사진 읽기 실패");
                }
            }
        }

        function applyAIResult(data) {
            const addr = data.receiver_addr || "";
            const name = data.receiver_name || "";
            const item = data.item_type || "";

            if (!addr && !name) {
                alert("내용을 찾지 못했습니다. 다시 시도해주세요.");
                return;
            }

            let msg = "AI가 찾은 내용입니다:\\n\\n";
            if (name) msg += "이름: " + name + "\\n";
            if (addr) msg += "주소: " + addr + "\\n";
            if (item) msg += "물건: " + item + "\\n";
            msg += "\\n이대로 입력할까요?";

            if (confirm(msg)) {
                if (data.receiver_name) document.getElementById('receiver_name').value = data.receiver_name;
                if (data.receiver_phone) document.getElementById('receiver_phone').value = data.receiver_phone;
                if (data.receiver_addr) document.getElementById('receiver_addr').value = data.receiver_addr;
                if (data.item_type) document.getElementById('item_type').value = data.item_type;
            }
        }

        // --- 4. Request Payment & Submit ---
        async function requestPayment() {
            // Validation
            const form = document.getElementById('courierForm');
            if (!form.sender_name.value || !form.sender_phone.value || !form.sender_addr.value ||
                !form.receiver_name.value || !form.receiver_phone.value || !form.receiver_addr.value ||
                !form.item_type.value) {
                alert("모든 내용을 입력해주세요.");
                return;
            }

            if (!confirm("택배를 예약하고 결제하시겠습니까?")) return;

            // Sender Save Logic
            const saveSender = document.getElementById("saveSender").checked;
            if (saveSender) {
                const senderInfo = {
                    name: form.sender_name.value,
                    phone: form.sender_phone.value,
                    addr: form.sender_addr.value,
                    addr_detail: form.sender_addr_detail.value
                };
                localStorage.setItem("courier_sender_info", JSON.stringify(senderInfo));
            } else {
                localStorage.removeItem("courier_sender_info");
            }

            // Get Payment Method
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

            const data = {
                sender_name: form.sender_name.value,
                sender_phone: form.sender_phone.value,
                sender_addr: form.sender_addr.value + ' ' + form.sender_addr_detail.value,
                receiver_name: form.receiver_name.value,
                receiver_phone: form.receiver_phone.value,
                receiver_addr1: form.receiver_addr.value,
                receiver_addr2: form.receiver_addr_detail.value || "",
                item_type: form.item_type.value,
                quantity: parseInt(form.quantity.value),
                weight: "small", // Default for elderly
                payment_method: paymentMethod
            };

            document.getElementById('loading').innerText = "결제 준비 중...";
            document.getElementById('loading').style.display = 'block';

            try {
                // 1. Reserve Order on Backend -> Get OrderID & Amount
                const response = await fetch('/api/citizen/courier/reserve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.success && result.payment_required) {
                    // 2. Request Toss Payment
                    await paymentWidget.requestPayment({
                        orderId: result.tracking_code, // Use tracking code as orderId
                        orderName: result.orderName,
                        amount: result.amount,
                        successUrl: window.location.origin + "/citizen/courier/toss/success",
                        failUrl: window.location.origin + "/citizen/courier/toss/fail",
                        customerEmail: "customer@example.com",
                        customerName: data.sender_name,
                        customerMobilePhone: data.sender_phone
                    });
                } else if (!result.success) {
                    alert("오류: " + result.error);
                    document.getElementById('loading').style.display = 'none';
                }

            } catch (error) {
                console.error(error);
                alert("시스템 오류가 발생했습니다.");
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>

</html>
