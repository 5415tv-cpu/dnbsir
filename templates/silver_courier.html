<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어르신 전용 택배 - 동네비서</title>
    <style>
        /* Chat UI Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 70vh;
            border: 2px solid #ccc;
            border-radius: 10px;
            background: #fafafa;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.4rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.ai {
            align-self: flex-start;
            background-color: #e9ecef;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message.user {
            align-self: flex-end;
            background-color: #ffc107;
            color: #000;
            border-bottom-right-radius: 5px;
        }

        /* Loading indicator for chat */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            color: #555;
            font-size: 1.2rem;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 2px solid #ccc;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            font-size: 1.4rem;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        .chat-send-btn {
            background-color: #343a40;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.4rem;
            border-radius: 10px;
            cursor: pointer;
            white-space: nowrap;
        }

        .chat-mic-btn {
            background-color: #28a745;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Payment Area inside Chat */
        .payment-modal {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border: 2px solid #28a745;
            border-radius: 15px;
        }
    </style>
    <!-- Toss Payments Widget SDK -->
    <script src="https://js.tosspayments.com/v1/payment-widget"></script>
</head>

<body>

    <div class="container">
        <h2>어르신 쉬운 택배</h2>

        <!-- Chat Interface -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">안녕하세요! 동네비서 택배 도우미입니다.<br>어느 분께 물건을 보내시나요? 이름과 전화번호, 주소를 편하게 말씀해 주시거나 적어주세요.
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">도우미가 생각 중입니다...</div>

            <div class="chat-input-area">
                <button class="chat-mic-btn" onclick="startChatVoice()" id="micBtn">🎤</button>
                <input type="text" id="chatInput" class="chat-input" placeholder="여기에 적어주세요..."
                    onkeypress="handleEnter(event)">
                <button class="chat-send-btn" onclick="sendChatMessage()">전송</button>
            </div>
        </div>

        <div class="payment-modal" id="paymentModal">
            <h3 style="margin-top:0; color:#28a745;">택배 결제</h3>
            <p style="font-size:1.2rem;">택배비: <strong>6,000원</strong></p>
            <div id="payment-method"></div>
            <div id="agreement"></div>
            <button class="submit-btn" style="margin-top:10px;" onclick="executePayment()">결제하기</button>
        </div>
    </div>

    <script>
        let currentState = {};

        // Toss Widget Setup
        const clientKey = "test_ck_PBal2vxj81ND2OPW6a7135RQgOAN";
        const customerKey = "ANONYMOUS";
        let paymentWidget = null;

        function initToss() {
            if (paymentWidget) return; // Already initialized
            try {
                if (window.PaymentWidget) {
                    paymentWidget = PaymentWidget(clientKey, customerKey);
                    paymentWidget.renderPaymentMethods('#payment-method', { value: 6000 }, { variantKey: 'DEFAULT' });
                    paymentWidget.renderAgreement('#agreement', { variantKey: 'AGREEMENT' });
                }
            } catch (e) {
                console.error("Toss Error:", e);
            }
        }

        // Chat UI Functions
        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping(show) {
            document.getElementById('typingIndicator').style.display = show ? 'block' : 'none';
            const chatBox = document.getElementById('chatMessages');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        }

        async function sendChatMessage(overrideText = null) {
            const input = document.getElementById('chatInput');
            const text = overrideText || input.value.trim();
            if (!text) return;

            if (!overrideText) {
                input.value = '';
            }

            addMessage(text, 'user');
            showTyping(true);

            try {
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        current_state: currentState
                    })
                });

                const data = await response.json();
                showTyping(false);

                if (data.error) {
                    addMessage("죄송합니다. 오류가 발생했습니다. 다시 말씀해주세요.", 'ai');
                    return;
                }

                // Update State
                if (data.extracted_data) {
                    currentState = data.extracted_data;
                }

                // Show AI Response
                if (data.next_message) {
                    addMessage(data.next_message, 'ai');
                }

                // Show Payment if complete
                if (data.is_complete) {
                    document.getElementById('paymentModal').style.display = 'block';
                    setTimeout(initToss, 100); // Initialize Toss Widget after rendering the modal
                    addMessage("아래 결제창에서 결제를 진행해주세요.", 'ai');
                    // Lock chat
                    document.getElementById('chatInput').disabled = true;
                    document.querySelector('.chat-send-btn').disabled = true;
                    document.getElementById('micBtn').disabled = true;
                }

            } catch (e) {
                showTyping(false);
                addMessage("통신에 실패했습니다. 다시 시도해주세요.", 'ai');
                console.error(e);
            }
        }

        // Voice Recognition for Chat
        let recognition;
        function startChatVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("크롬 브라우저를 사용해주세요.");
                return;
            }

            const micBtn = document.getElementById('micBtn');
            if (recognition && micBtn.innerText === '🛑') {
                recognition.stop();
                micBtn.innerText = '🎤';
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = true;

            const input = document.getElementById('chatInput');
            let final_transcript = '';

            recognition.onstart = function () {
                micBtn.innerText = '🛑';
                micBtn.style.backgroundColor = '#dc3545';
                input.placeholder = "듣고 있습니다...";
            };

            recognition.onresult = function (event) {
                let interim_transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        final_transcript += event.results[i][0].transcript;
                    } else {
                        interim_transcript += event.results[i][0].transcript;
                    }
                }
                input.value = final_transcript + interim_transcript;
            };

            recognition.onerror = function (event) {
                console.error("Speech Error:", event.error);
                micBtn.innerText = '🎤';
                micBtn.style.backgroundColor = '#28a745';
                input.placeholder = "여기에 적어주세요...";
            };

            recognition.onend = function () {
                micBtn.innerText = '🎤';
                micBtn.style.backgroundColor = '#28a745';
                input.placeholder = "여기에 적어주세요...";
                if (final_transcript.trim()) {
                    sendChatMessage(final_transcript);
                }
            };

            recognition.start();
        }

        // Payment Execution
        async function executePayment() {
            if (!paymentWidget) {
                alert("결제 위젯 로딩 실패");
                return;
            }

            // Format data for backend reserve API (simulating form data)
            const reserveData = {
                sender_name: currentState.sender_name || "익명",
                sender_phone: currentState.sender_phone || "000-0000-0000",
                sender_addr: currentState.sender_addr || "주소 없음",
                receiver_name: currentState.receiver_name || "익명",
                receiver_phone: currentState.receiver_phone || "000-0000-0000",
                receiver_addr1: currentState.receiver_addr || "주소 없음",
                receiver_addr2: "",
                item_type: currentState.item_type || "일반품목",
                quantity: currentState.quantity || 1,
                weight: "small",
                payment_method: "toss"
            };

            try {
                const response = await fetch('/api/citizen/courier/reserve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reserveData)
                });

                const result = await response.json();

                if (result.success && result.payment_required) {
                    await paymentWidget.requestPayment({
                        orderId: result.tracking_code,
                        orderName: result.orderName,
                        amount: result.amount,
                        successUrl: window.location.origin + "/citizen/courier/toss/success",
                        failUrl: window.location.origin + "/citizen/courier/toss/fail",
                        customerName: reserveData.sender_name
                    });
                } else if (!result.success) {
                    alert("예약 실패: " + result.error);
                }
            } catch (e) {
                console.error(e);
                alert("결제창을 띄우는 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>

</html>
