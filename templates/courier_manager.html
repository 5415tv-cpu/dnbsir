<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로젠택배 태백지점 관리자</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .btn-download {
            display: block;
            width: 100%;
            padding: 20px;
            background-color: #28a745;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 30px;
            transition: background 0.3s;
        }

        .btn-download:hover {
            background-color: #218838;
        }

        .info-box {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="login-overlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center;">
            <h3>관리자 인증</h3>
            <input type="password" id="manager-pwd" placeholder="비밀번호"
                style="padding: 10px; font-size: 1rem; margin-bottom: 15px; width: 200px;">
            <br>
            <button onclick="checkPassword()"
                style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">확인</button>
        </div>
    </div>

    <div class="container">
        <h2>🚚 로젠택배 태백지점 예약 현황</h2>

        <div class="info-box">
            <p>오늘 날짜: <strong id="today-date"></strong></p>
            <p>현재 기준 접수된 예약이 엑셀로 다운로드됩니다.</p>
        </div>

        <a href="/api/manager/courier/excel" class="btn-download" onclick="return confirmDownload()">
            📥 오늘 예약 엑셀 다운로드
        </a>

        <div style="text-align: center; color: #666;">
            <small>다운로드된 파일이 열리지 않으면 '편집 사용'을 눌러주세요.</small>
        </div>
    </div>

    <script>
        // Simple client-side gate (MVP)
        function checkPassword() {
            const pwd = document.getElementById('manager-pwd').value;
            if (pwd === 'logen1234') { // Simple hardcoded password for MVP
                document.getElementById('login-overlay').style.display = 'none';
                localStorage.setItem('manager_auth', 'true');
            } else {
                alert('비밀번호가 틀렸습니다.');
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            if (localStorage.getItem('manager_auth') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
            }

            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('ko-KR', options);
        });

        function confirmDownload() {
            if (!confirm("엑셀 파일을 다운로드 하시겠습니까?")) return false;
            return true;
        }
    </script>
</body>

</html>
