<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ store_name }} - 로그인</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f8f9fa; color: #333; }
        .header { background: white; padding: 16px 20px; text-align: center; border-bottom: 1px solid #e9ecef; position: sticky; top: 0; z-index: 100; font-weight: 800; font-size: 18px; }
        .back-btn { position: absolute; left: 20px; top: 16px; text-decoration: none; color: #333; font-size: 20px; font-weight: bold; }
        .container { padding: 40px 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .form-group input:focus { border-color: #333; outline: none; }
        .submit-btn { background-color: #333; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background-color: #111; }
        .error-msg { color: #FF4B4F; font-size: 14px; margin-bottom: 20px; text-align: center; }
        .signup-link { display: block; text-align: center; margin-top: 24px; color: #666; text-decoration: none; font-size: 15px; }
        .signup-link strong { color: #333; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/cart" class="back-btn">←</a>
        로그인
    </div>
    
    <div class="container">
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="user_id" placeholder="아이디를 입력해주세요" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력해주세요" required>
            </div>
            <button type="submit" class="submit-btn">로그인</button>
        </form>
        
        <a href="/signup" class="signup-link">아직 계정이 없으신가요? <strong>회원가입하기</strong></a>
    </div>
</body>
</html>
