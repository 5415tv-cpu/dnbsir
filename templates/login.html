{% extends "base.html" %}

{% block content %}
<div class="login-wrapper"
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; background-color: #f8f9fa;">

    <div class="login-box"
        style="background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px;">

        <!-- Tabs -->
        <div style="display: flex; margin-bottom: 30px; border-bottom: 2px solid #eee;">
            <div id="tab-login" onclick="switchTab('login')"
                style="flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; color: #1a1a1a; border-bottom: 3px solid #1a1a1a;">
                로그인
            </div>
            <div id="tab-signup" onclick="switchTab('signup')"
                style="flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; color: #aaa; border-bottom: 3px solid transparent;">
                무료 회원가입
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <h2 id="formTitle" class="app-title" style="font-size: 1.8rem; margin-bottom: 10px;">사장님 로그인</h2>
            <p id="formDesc" style="font-size: 1rem; color: #666; word-break: keep-all;">가게 ID와 비밀번호를 입력해주세요</p>
        </div>

        <form id="loginForm">
            <input type="hidden" id="authMode" name="mode" value="login">

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700;">휴대폰 번호 (아이디)</label>
                <input type="tel" id="store_id" name="store_id" class="login-input" placeholder="010-0000-0000" required
                    style="width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700;">비밀번호</label>
                <input type="password" id="password" name="password" class="login-input" placeholder="6자리 이상 입력"
                    required
                    style="width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem;">
            </div>

            <button type="submit" id="submitBtn" class="main-btn"
                style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 10px; background: #1a1a1a; color: #fff; border: none; font-weight: bold; cursor: pointer;">
                로그인하기
            </button>
        </form>

        <p style="text-align: center; font-size: 0.9rem; margin-top: 25px; color: #888; line-height: 1.5;">
            * 가입 즉시 <b>모든 기능</b>을 무료로 체험할 수 있습니다.<br>
            (초기 설정이나 서류 제출 없이 바로 시작하세요)
        </p>
    </div>

    <!-- A2HS Bottom Sheet -->
    <div id="a2hsBottomSheet"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99999; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(2px); transition: opacity 0.3s ease;">
        <div
            style="background: #fff; width: 100%; max-width: 600px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 30px 20px 40px; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); position: relative; animation: slideUp 0.3s ease-out forwards;">

            <script>
                if (!document.getElementById('slideUpStyle')) {
                    const style = document.createElement('style');
                    style.id = 'slideUpStyle';
                    style.innerHTML = `
                        @keyframes slideUp {
                            from { transform: translateY(100%); }
                            to { transform: translateY(0); }
                        }
                    `;
                    document.head.appendChild(style);
                }
            </script>

            <button onclick="skipA2hs()"
                style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;">✕</button>

            <div style="text-align: center; margin-bottom: 25px;">
                <div style="font-size: 3rem; margin-bottom: 15px;">📱</div>
                <h3 style="margin-top: 0; font-size: 1.5rem; font-weight: 900; color: #1a1a1a; margin-bottom: 10px;">가입을
                    축하합니다!</h3>
                <p style="font-size: 1rem; color: #555; line-height: 1.6; word-break: keep-all;">
                    이제 앱처럼 <b>바탕화면에 설치</b>해두고<br>
                    1초 만에 스마트하게 접속하세요.<br><br>
                    <span
                        style="font-size: 0.9rem; background: #f1f3f5; padding: 10px; border-radius: 8px; display: inline-block;">
                        💡 <b>iPhone:</b> 하단 [공유 <span style="font-size:1.2rem;">⍐</span>] ➔ [홈 화면에 추가 +]<br>
                        💡 <b>Android:</b> 상단 [메뉴 <span style="font-size:1.2rem;">⋮</span>] ➔ [홈 화면에 추가 +]
                    </span>
                </p>
            </div>

            <div style="display: flex; gap: 10px; flex-direction: column;">
                <!-- On Android/PWA, we could trigger native prompt here, but native browser instructions usually require manual user action -->
                <button onclick="skipA2hs()" class="main-btn"
                    style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 12px; background: #1a1a1a; color: #fff; border: none; font-weight: bold;">
                    확인 및 대시보드 이동
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    // Initial State based on URL param
    const urlParams = new URLSearchParams(window.location.search);
    const initialMode = urlParams.get('mode') || 'login';
    switchTab(initialMode);

    function switchTab(mode) {
        const loginTab = document.getElementById('tab-login');
        const signupTab = document.getElementById('tab-signup');
        const title = document.getElementById('formTitle');
        const desc = document.getElementById('formDesc');
        const btn = document.getElementById('submitBtn');
        const hiddenInput = document.getElementById('authMode');

        if (mode === 'signup') {
            // Activate Signup
            signupTab.style.color = '#1a1a1a';
            signupTab.style.borderBottom = '3px solid #1a1a1a';
            loginTab.style.color = '#aaa';
            loginTab.style.borderBottom = '3px solid transparent';

            title.innerText = '30초면 가입 완료!';
            desc.innerText = '휴대폰 번호만으로 간편하게 시작하세요.';
            btn.innerText = '무료로 시작하기';
            hiddenInput.value = 'signup';

            // Update URL without reload
            window.history.replaceState(null, '', '/admin?mode=signup');
        } else {
            // Activate Login
            loginTab.style.color = '#1a1a1a';
            loginTab.style.borderBottom = '3px solid #1a1a1a';
            signupTab.style.color = '#aaa';
            signupTab.style.borderBottom = '3px solid transparent';

            title.innerText = '사장님 로그인';
            desc.innerText = '가게 ID와 비밀번호를 입력해주세요';
            btn.innerText = '로그인하기';
            hiddenInput.value = 'login';

            window.history.replaceState(null, '', '/admin?mode=login');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        // [UX] Prevent double click
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = '처리 중...';

        const formData = new FormData(this);

        try {
            const API_BASE_URL = "{{ api_url }}";

            // Same backend endpoint for both logic (Auto-signup handling)
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                body: formData,
                redirect: 'manual'
            });

            if (response.type === 'opaqueredirect' || response.status === 0 || response.status === 303 || response.status === 200) {
                // Set Cookie
                document.cookie = "admin_session=" + formData.get('store_id') + "; path=/; max-age=86400";

                if (formData.get('mode') === 'signup') {
                    // Show A2HS modal
                    const modal = document.getElementById('a2hsBottomSheet');
                    modal.style.display = 'flex';
                    modal.style.opacity = '0';
                    setTimeout(() => modal.style.opacity = '1', 10);
                } else {
                    window.location.href = "/admin/dashboard";
                }
            } else if (response.status === 404) {
                alert('가입되지 않은 회원입니다. [무료 회원가입] 탭 이용해주세요.');
                switchTab('signup');
                btn.disabled = false;
                btn.innerText = originalText;
            } else if (response.status === 409) {
                alert('이미 가입된 번호입니다. [로그인] 탭을 이용해주세요.');
                switchTab('login');
                btn.disabled = false;
                btn.innerText = originalText;
            } else if (response.status === 401) {
                alert('비밀번호가 일치하지 않습니다.');
                btn.disabled = false;
                btn.innerText = originalText;
            } else {
                alert('오류가 발생했습니다. 정보를 확인해주세요. (Code: ' + response.status + ')');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        } catch (error) {
            console.error('Login Error:', error);
            alert('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            btn.disabled = false;
            btn.innerText = originalText;
        }
    });

    function skipA2hs() {
        const modal = document.getElementById('a2hsBottomSheet');
        modal.style.opacity = '0';
        setTimeout(() => {
            modal.style.display = 'none';
            window.location.href = "/admin/dashboard";
        }, 300);
    }
</script>
{% endblock %}
