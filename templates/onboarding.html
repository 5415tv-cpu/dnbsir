<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동네비서 1분 자동 입점</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #111;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .domain-input-group {
            display: flex;
            align-items: center;
        }
        .domain-input-group input {
            flex: 1;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .domain-suffix {
            background: #f1f3f5;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-left: none;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            color: #555;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #FF5A5F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #E0484D;
        }
        .security-notice {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>동네비서 파트너 입점</h1>
        <p class="subtitle">사진 1장과 이름만 입력하면 즉시 나만의 상점이 완성됩니다.</p>
        
        <!-- 보안상 enctype="multipart/form-data" 필수 -->
        <form action="/onboard" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="subdomain">원하시는 인터넷 주소 (영문)</label>
                <div class="domain-input-group">
                    <input type="text" id="subdomain" name="subdomain" placeholder="kimfarm" required pattern="[a-zA-Z0-9-]+" title="영문자와 숫자, 하이픈만 가능합니다.">
                    <div class="domain-suffix">.dongnebiseo.com</div>
                </div>
            </div>

            <div class="form-group">
                <label for="store_name">상점 이름</label>
                <input type="text" id="store_name" name="store_name" placeholder="예: 소백산 김씨농장" required>
            </div>

            <div class="form-group">
                <label for="description">간단한 소개 (선택)</label>
                <textarea id="description" name="description" rows="3" placeholder="예: 당일 수확한 신선한 사과만 보내드립니다."></textarea>
            </div>

            <div class="form-group">
                <label for="store_image">대표 사진 업로드 (5MB 이하, JPG/PNG)</label>
                <input type="file" id="store_image" name="store_image" accept=".jpg, .jpeg, .png" required>
            </div>

            <button type="submit">1분 만에 상점 만들기</button>
        </form>

        <div class="security-notice">
            🔒 <b>보안 시스템 가동 중</b>: 해킹 방지를 위해 이미지 확장자 변조 검사 및 파일 헤더 분석이 자동으로 수행되며, 5MB 이상의 파일은 업로드가 원천 차단됩니다.
        </div>
    </div>
    
    <script>
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('store_image');
            const submitBtn = document.querySelector('button[type="submit"]');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                alert("대표 사진을 반드시 선택해주세요.");
                return;
            }
            
            const file = fileInput.files[0];
            
            // 버튼 상태 변경
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "사진을 최적화하는 중입니다...";
            submitBtn.disabled = true;
            submitBtn.style.backgroundColor = "#999";
            
            try {
                // 1. EXIF 회전 문제 해결 및 초기 리사이즈 (OOM 방지를 위해 가로세로 최대 2560px 제한)
                const preOptions = {
                    maxSizeMB: 5,
                    maxWidthOrHeight: 2560,
                    useWebWorker: true,
                    fileType: 'image/jpeg'
                };
                const orientedBlob = await imageCompression(file, preOptions);
                
                // 2. Blob을 Image 객체로 로드하여 16:9 중앙 크롭
                const imageUrl = URL.createObjectURL(orientedBlob);
                const image = new Image();
                
                await new Promise((resolve, reject) => {
                    image.onload = resolve;
                    image.onerror = reject;
                    image.src = imageUrl;
                });
                
                URL.revokeObjectURL(imageUrl);
                
                const canvas = document.createElement('canvas');
                const targetRatio = 16 / 9;
                const originalRatio = image.width / image.height;
                
                let sourceX = 0, sourceY = 0, sourceWidth = image.width, sourceHeight = image.height;
                
                if (originalRatio > targetRatio) {
                    // 이미지가 더 넓음 (가로를 자름)
                    sourceWidth = image.height * targetRatio;
                    sourceX = (image.width - sourceWidth) / 2;
                } else {
                    // 이미지가 더 높음 (세로를 자름)
                    sourceHeight = image.width / targetRatio;
                    sourceY = (image.height - sourceHeight) / 2;
                }
                
                // 최종 캔버스 크기 (최대 가로 1920 기준)
                const finalWidth = Math.min(1920, sourceWidth);
                const finalHeight = finalWidth / targetRatio;
                
                canvas.width = finalWidth;
                canvas.height = finalHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(
                    image, 
                    sourceX, sourceY, sourceWidth, sourceHeight,
                    0, 0, finalWidth, finalHeight
                );
                
                // 3. 캔버스를 Blob으로 변환
                const croppedBlob = await new Promise((resolve) => {
                    canvas.toBlob(resolve, 'image/jpeg', 0.9);
                });
                
                if (!croppedBlob) throw new Error("Canvas to Blob failed");
                
                // 4. 최종 1MB 이하로 재압축 보장
                const finalOptions = {
                    maxSizeMB: 1,
                    maxWidthOrHeight: 1920,
                    useWebWorker: true,
                    fileType: 'image/jpeg',
                    initialQuality: 0.8
                };
                
                const croppedFileObj = new File([croppedBlob], "temp.jpg", { type: "image/jpeg" });
                const finalCompressedFile = await imageCompression(croppedFileObj, finalOptions);
                
                // 새로운 File 객체 생성 (기존 파일명 유지, 확장자는 .jpg)
                const newFileName = file.name.replace(/\.[^/.]+$/, "") + "_cropped.jpg";
                const newFileObj = new File([finalCompressedFile], newFileName, {
                    type: "image/jpeg",
                });
                
                // fileInput 값 교체
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(newFileObj);
                fileInput.files = dataTransfer.files;
                
                // 폼 강제 제출 (이벤트 리스너 우회)
                HTMLFormElement.prototype.submit.call(this);
                
            } catch (error) {
                console.error("이미지 압축 중 오류 발생:", error);
                alert("이미지 처리 중 오류가 발생했습니다. 다시 시도해주세요.");
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.style.backgroundColor = ""; // 원래 색상으로 복구 (CSS 클래스 의존)
            }
        });
    </script>
</body>
</html>
