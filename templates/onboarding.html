<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동네비서 1분 자동 입점</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #111;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .domain-input-group {
            display: flex;
            align-items: center;
        }
        .domain-input-group input {
            flex: 1;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .domain-suffix {
            background: #f1f3f5;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-left: none;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            color: #555;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #FF5A5F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #E0484D;
        }
        .security-notice {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>동네비서 파트너 입점</h1>
        <p class="subtitle">사진 1장과 이름만 입력하면 즉시 나만의 상점이 완성됩니다.</p>
        
        <!-- 보안상 enctype="multipart/form-data" 필수 -->
        <form action="/onboard" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="subdomain">원하시는 인터넷 주소 (영문)</label>
                <div class="domain-input-group">
                    <input type="text" id="subdomain" name="subdomain" placeholder="kimfarm" required pattern="[a-zA-Z0-9-]+" title="영문자와 숫자, 하이픈만 가능합니다.">
                    <div class="domain-suffix">.dongnebiseo.com</div>
                </div>
            </div>

            <div class="form-group">
                <label for="store_name">상점 이름</label>
                <input type="text" id="store_name" name="store_name" placeholder="예: 소백산 김씨농장" required>
            </div>

            <div class="form-group">
                <label for="description">간단한 소개 (선택)</label>
                <textarea id="description" name="description" rows="3" placeholder="예: 당일 수확한 신선한 사과만 보내드립니다."></textarea>
            </div>

            <div class="form-group">
                <label for="store_image">대표 사진 업로드 (5MB 이하, JPG/PNG)</label>
                <input type="file" id="store_image" name="store_image" accept=".jpg, .jpeg, .png" required>
            </div>

            <button type="submit">1분 만에 상점 만들기</button>
        </form>

        <div class="security-notice">
            🔒 <b>보안 시스템 가동 중</b>: 해킹 방지를 위해 이미지 확장자 변조 검사 및 파일 헤더 분석이 자동으로 수행되며, 5MB 이상의 파일은 업로드가 원천 차단됩니다.
        </div>
    </div>
</body>
</html>
