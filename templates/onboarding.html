{% extends "base.html" %}

{% block content %}
<div class="onboarding-wrapper" style="min-height: 100vh; background-color: #f8f9fa; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start;">
    <div style="background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center;">
        
        <img src="{{ static_url('icons/dnbsir-icon-192.png') }}" alt="로고" style="width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px;">
        
        <h1 style="font-size: 1.8rem; font-weight: 900; color: #1a1a1a; margin-bottom: 10px;">환영합니다! 🎉</h1>
        <p style="color: #666; margin-bottom: 30px; font-size: 1.05rem; word-break: keep-all;">
            동네비서에 오신 것을 환영합니다.<br>맞춤형 화면을 제공하기 위해 역할을 선택해 주세요.
        </p>

        <!-- Role Selection -->
        <div id="roleSelection" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;">
            <button type="button" onclick="selectRole('citizen')" class="role-btn" id="btn-citizen"
                style="padding: 20px; border: 2px solid #e9ecef; border-radius: 15px; background: #fff; cursor: pointer; text-align: left; transition: all 0.2s ease;">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">🙋‍♂️</div>
                <div style="font-weight: 800; font-size: 1.2rem; color: #1a1a1a;">일반 시민</div>
                <div style="font-size: 0.9rem; color: #888; margin-top: 5px;">동네 심부름, 택배 발송, 일상 서비스 이용</div>
            </button>

            <button type="button" onclick="selectRole('owner')" class="role-btn" id="btn-owner"
                style="padding: 20px; border: 2px solid #e9ecef; border-radius: 15px; background: #fff; cursor: pointer; text-align: left; transition: all 0.2s ease;">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">🏪</div>
                <div style="font-weight: 800; font-size: 1.2rem; color: #1a1a1a;">동네 사장님</div>
                <div style="font-size: 0.9rem; color: #888; margin-top: 5px;">예약 관리, 단골 관리, 비서 자동화 시스템</div>
            </button>

            <button type="button" onclick="selectRole('farmer')" class="role-btn" id="btn-farmer"
                style="padding: 20px; border: 2px solid #e9ecef; border-radius: 15px; background: #fff; cursor: pointer; text-align: left; transition: all 0.2s ease;">
                <div style="font-size: 1.5rem; margin-bottom: 8px;">🧑‍🌾</div>
                <div style="font-weight: 800; font-size: 1.2rem; color: #1a1a1a;">농민 / 생산자</div>
                <div style="font-size: 0.9rem; color: #888; margin-top: 5px;">농산물 산지직송, 대량 택배, 직거래 장터</div>
            </button>
        </div>

        <!-- Additional Info Form (Hidden by default) -->
        <form id="onboardingForm" method="POST" action="/onboarding" style="display: none; text-align: left; animation: fadeIn 0.3s ease;">
            <input type="hidden" name="role" id="selectedRoleInput" value="">
            
            <div id="extraFields" style="display: none; flex-direction: column; gap: 20px; margin-bottom: 30px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #1a1a1a;" id="storeNameLabel">상호명</label>
                    <input type="text" name="store_name" id="store_name" placeholder="가게 또는 농장 이름을 입력하세요"
                        style="width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #1a1a1a;">사업자등록번호 <span style="color: #aaa; font-weight: normal; font-size: 0.85rem;">(선택)</span></label>
                    <input type="text" name="biz_number" placeholder="000-00-00000"
                        style="width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #1a1a1a;">주소 <span style="color: #aaa; font-weight: normal; font-size: 0.85rem;">(선택)</span></label>
                    <input type="text" name="address" placeholder="예: 서울시 강남구"
                        style="width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem;">
                </div>
            </div>

            <button type="submit" class="main-btn"
                style="width: 100%; padding: 18px; font-size: 1.15rem; border-radius: 15px; background: #1a1a1a; color: #fff; border: none; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                시작하기
            </button>
            <button type="button" onclick="resetSelection()" style="width: 100%; padding: 15px; background: none; border: none; color: #888; font-weight: bold; margin-top: 10px; cursor: pointer;">
                이전으로
            </button>
        </form>

    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .role-btn:hover {
        border-color: #1a1a1a !important;
        transform: translateY(-2px);
    }
</style>

<script>
    function selectRole(role) {
        document.getElementById('selectedRoleInput').value = role;
        
        // Hide role selection, show form
        document.getElementById('roleSelection').style.display = 'none';
        document.getElementById('onboardingForm').style.display = 'block';
        
        const extraFields = document.getElementById('extraFields');
        const storeNameLabel = document.getElementById('storeNameLabel');
        const storeNameInput = document.getElementById('store_name');
        
        if (role === 'citizen') {
            extraFields.style.display = 'none';
            // 시민은 추가 정보 없이 바로 제출 가능하게
            storeNameInput.removeAttribute('required');
        } else {
            extraFields.style.display = 'flex';
            storeNameInput.setAttribute('required', 'required');
            
            if (role === 'farmer') {
                storeNameLabel.innerText = '농장 이름';
                storeNameInput.placeholder = '예: 탄탄농장';
            } else {
                storeNameLabel.innerText = '상호명 (가게 이름)';
                storeNameInput.placeholder = '예: 1초 배달마트';
            }
        }
    }

    function resetSelection() {
        document.getElementById('roleSelection').style.display = 'flex';
        document.getElementById('onboardingForm').style.display = 'none';
    }
</script>
{% endblock %}
