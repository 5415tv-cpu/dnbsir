{% extends "tantan_base.html" %}

{% block title %}관리자 로그인 - 탄탄제작소{% endblock %}

{% block content %}
<style>
    .auth-footer-links {
        margin-top: 20px;
        text-align: center;
        font-size: 0.95rem;
        color: #666;
    }
    .auth-footer-links a {
        color: #ffcc00;
        text-decoration: none;
        font-weight: bold;
        margin: 0 10px;
    }
    .auth-footer-links a:hover {
        text-decoration: underline;
    }
    .divider {
        color: #ccc;
    }
</style>

<div class="auth-container" style="max-width: 500px; margin: 40px auto; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
    <h2 class="page-title" style="text-align: center; font-size: 2rem; color: #111; margin-bottom: 30px; font-weight: 800;">본사 관리자 로그인</h2>
    
    <div class="auth-box">
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="username" class="form-label" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">관리자 아이디</label>
                <input type="text" id="username" name="username" class="form-input form-input-large" required autofocus placeholder="아이디를 입력하세요" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;">
            </div>
            
            <div class="form-group" style="margin-bottom: 30px;">
                <label for="password" class="form-label" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">비밀번호</label>
                <input type="password" id="password" name="password" class="form-input form-input-large" required placeholder="비밀번호를 입력하세요" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-large" style="width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; background: #ffcc00; color: #111; cursor: pointer; transition: background 0.3s;">로그인 하기</button>
        </form>
        
        <div class="auth-footer-links">
            <a href="{{ url_for('register') }}">도입 및 제휴 문의하기</a>
        </div>
    </div>
</div>
{% endblock %}
