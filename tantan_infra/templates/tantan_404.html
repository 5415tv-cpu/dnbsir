{% extends "tantan_base.html" %}

{% block title %}페이지를 찾을 수 없습니다 - 탄탄제작소{% endblock %}

{% block content %}
<div class="error-container">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">페이지를 찾을 수 없습니다.</h2>
    <p class="error-desc">요청하신 페이지의 주소가 잘못되었거나, 더 이상 제공되지 않는 페이지입니다.</p>
    
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-large">홈으로 돌아가기</a>
</div>
{% endblock %}
